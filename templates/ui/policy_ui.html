<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Management - Safety Eval Mini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-bottom: 3px solid #5568d3;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 8px;
            flex: 1;
        }
        .stat-card .label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        .main-content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
        }
        .editor-container {
            position: relative;
        }
        textarea {
            width: 100%;
            min-height: 500px;
            padding: 20px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            transition: background 0.3s;
            font-size: 14px;
        }
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Policy Management</h1>
            <p>Edit and validate YAML policies with real-time feedback</p>
            <div class="stats">
                <div class="stat-card">
                    <div class="label">Version</div>
                    <div class="value">{{ policy_version }}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Policy Slices</div>
                    <div class="value">{{ num_slices }}</div>
                </div>
            </div>
            <div class="nav-links">
                <a href="/ui/test" class="nav-link">🧪 Test Runner</a>
                <a href="/docs" class="nav-link">📚 API Docs</a>
            </div>
        </div>
        
        <div class="main-content">
            <div id="alert" class="alert"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Saving and validating policy...</p>
            </div>
            
            <div class="section">
                <h2>Policy Editor</h2>
                <div class="editor-container">
                    <textarea id="policyEditor" spellcheck="false">{{ policy_yaml }}</textarea>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="savePolicy()">💾 Save Policy</button>
                    <button class="btn-secondary" onclick="validatePolicy()">✓ Validate Only</button>
                    <button class="btn-success" onclick="window.location.href='/ui/test'">🧪 Test Policy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        async function validatePolicy() {
            const content = document.getElementById('policyEditor').value;
            try {
                // Try to parse YAML
                const data = jsyaml.load(content);
                showAlert('✓ YAML is valid! Use "Save Policy" to persist changes.', 'success');
            } catch (e) {
                showAlert(`✗ YAML validation failed: ${e.message}`, 'error');
            }
        }

        async function savePolicy() {
            const content = document.getElementById('policyEditor').value;
            showLoading(true);
            
            try {
                const response = await fetch('/ui/policies', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ yaml_content: content }),
                });

                const result = await response.json();
                
                if (response.ok) {
                    showAlert('✓ Policy saved successfully and committed to git!', 'success');
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                } else {
                    showAlert(`✗ Failed to save policy: ${result.detail || 'Unknown error'}`, 'error');
                }
            } catch (e) {
                showAlert(`✗ Network error: ${e.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Add Ctrl+S / Cmd+S shortcut
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                savePolicy();
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</body>
</html>
