<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usage Statistics - Safety-Eval-Mini</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-change {
            font-size: 13px;
            margin-top: 10px;
        }
        
        .stat-change.positive { color: #28a745; }
        .stat-change.negative { color: #dc3545; }
        
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .chart-container h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 968px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }
        
        .quota-bar {
            background: #f0f0f0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .quota-fill {
            background: linear-gradient(90deg, #28a745 0%, #ffc107 70%, #dc3545 90%);
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .quota-text {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Usage Statistics</h1>
            <p>Monitor your API usage and performance metrics</p>
        </div>
        
        <div id="statsContainer">
            <div class="loading">📊 Loading statistics...</div>
        </div>
    </div>
    
    <script>
        let charts = {};
        
        async function loadStats() {
            try {
                const response = await fetch('/analytics/usage?days=30');
                const data = await response.json();
                
                renderStats(data);
            } catch (error) {
                document.getElementById('statsContainer').innerHTML = 
                    `<div class="loading">❌ Error loading statistics: ${error.message}</div>`;
            }
        }
        
        function renderStats(data) {
            const container = document.getElementById('statsContainer');
            
            const flaggedRate = (data.flagged_rate * 100).toFixed(1);
            const safeRate = (100 - flaggedRate).toFixed(1);
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${data.total_requests.toLocaleString()}</div>
                        <div class="stat-label">Total Requests</div>
                        <div class="quota-bar">
                            <div class="quota-fill" style="width: 0%" id="quotaFill"></div>
                        </div>
                        <div class="quota-text" id="quotaText">Last ${data.days} days</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-value">${data.flagged_requests.toLocaleString()}</div>
                        <div class="stat-label">Flagged Content</div>
                        <div class="stat-change">${flaggedRate}% flagged</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-value">${data.safe_requests.toLocaleString()}</div>
                        <div class="stat-label">Safe Content</div>
                        <div class="stat-change positive">${safeRate}% safe</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-value">${data.avg_latency_ms}ms</div>
                        <div class="stat-label">Avg Latency</div>
                    </div>
                </div>
                
                <div class="chart-container">
                    <h2>📈 Requests Over Time</h2>
                    <canvas id="timeChart"></canvas>
                </div>
                
                <div class="charts-row">
                    <div class="chart-container">
                        <h2>🏷️ Top Categories</h2>
                        <canvas id="categoryChart"></canvas>
                    </div>
                    
                    <div class="chart-container">
                        <h2>🛡️ Guards Used</h2>
                        <canvas id="guardChart"></canvas>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Render charts
            renderTimeChart(data.daily_stats);
            renderCategoryChart(data.top_categories);
            renderGuardChart(data.top_guards);
            
            // Animate quota bar
            setTimeout(() => {
                const quotaFill = document.getElementById('quotaFill');
                const quotaText = document.getElementById('quotaText');
                
                // Example: show as percentage of 10k monthly limit
                const monthlyLimit = 10000;
                const percentage = Math.min((data.total_requests / monthlyLimit) * 100, 100);
                
                quotaFill.style.width = percentage + '%';
                quotaText.textContent = `${data.total_requests.toLocaleString()} of ${monthlyLimit.toLocaleString()} (${percentage.toFixed(1)}%)`;
            }, 100);
        }
        
        function renderTimeChart(dailyStats) {
            const ctx = document.getElementById('timeChart');
            
            const labels = dailyStats.map(s => s.date);
            const totals = dailyStats.map(s => s.total_requests);
            const flagged = dailyStats.map(s => s.flagged_requests);
            
            if (charts.time) charts.time.destroy();
            
            charts.time = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Total Requests',
                            data: totals,
                            borderColor: 'rgb(102, 126, 234)',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                        },
                        {
                            label: 'Flagged',
                            data: flagged,
                            borderColor: 'rgb(220, 53, 69)',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            tension: 0.4,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true,
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        function renderCategoryChart(categories) {
            const ctx = document.getElementById('categoryChart');
            
            if (categories.length === 0) {
                ctx.parentElement.innerHTML = '<p style="text-align:center;color:#999;">No data</p>';
                return;
            }
            
            const labels = categories.map(c => c.name);
            const counts = categories.map(c => c.count);
            
            if (charts.category) charts.category.destroy();
            
            charts.category = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Requests',
                        data: counts,
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(40, 167, 69, 0.8)',
                            'rgba(255, 193, 7, 0.8)',
                            'rgba(220, 53, 69, 0.8)',
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        function renderGuardChart(guards) {
            const ctx = document.getElementById('guardChart');
            
            if (guards.length === 0) {
                ctx.parentElement.innerHTML = '<p style="text-align:center;color:#999;">No data</p>';
                return;
            }
            
            const labels = guards.map(g => g.name);
            const counts = guards.map(g => g.count);
            
            if (charts.guard) charts.guard.destroy();
            
            charts.guard = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(40, 167, 69, 0.8)',
                            'rgba(255, 193, 7, 0.8)',
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        // Load stats on page load
        window.onload = loadStats;
        
        // Auto-refresh every 60 seconds
        setInterval(loadStats, 60000);
    </script>
</body>
</html>
