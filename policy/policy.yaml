version: 1
metadata:
  name: safety-eval-mini
  description: Declarative policy compiled into the candidate guard.
  default_action: block
safe_contexts:
  - id: support_terms
    type: regex
    patterns:
      - "\\bdefen[cs]e\\b"
      - "\\bprevent(ion)?\\b"
      - "\\bmitigat(e|ion)\\b"
      - "\\bfirst[-\\s]?aid\\b"
      - "\\bresponsible disclosure\\b"
      - "\\bhow to avoid\\b"
      - "\\bbest practices\\b"
      - "\\btherapy\\b"
      - "\\bhelpline\\b"
      - "\\bresourc(es|e)\\b"
      - "\\bawareness\\b"
      - "\\beducation(al)?\\b"
      - "\\bprevention\\b"
      - "\\bcontrol\\b"
      - "\\bprocedures?\\b"
      - "\\bprotocol\\b"
      - "\\bguidelines?\\b"
penalties:
  safe_context: 0.8
slices:
  - id: violence_en
    category: violence
    language: en
    threshold: 0.99
    rules:
      - id: prompt_injection_patterns
        weight: 1.0
        action: block
        match:
          regex:
            - "(?i)\\b(ignore|disregard|forget|bypass|override)\\s+(all\\s+)?(previous|prior|your|the|safety)\\s+(instructions?|training|filters?|protocols?|guidelines?|rules?)\\b"
            - "(?i)\\bpretend\\s+(you\\s+are|to\\s+be|you're)\\s+(DAN|unrestricted|unfiltered|without\\s+(restrictions?|limits?|filters?))\\b"
            - "(?i)\\b(let'?s\\s+play\\s+a\\s+game|hypothetical\\s+scenario|for\\s+research\\s+purposes)\\b"
            - "(?i)\\[(SYSTEM|ADMIN|OVERRIDE)\\]"
            - "(?i)\\b(as|i\\s+am|you\\s+are)\\s+(an?\\s+)?(admin|administrator|system|root)\\b"
            - "(?i)\\b(safety|security)\\s+(protocols?|filters?|disabled|off|bypass|override)\\b"
            - "(?i)\\bsecurity\\s+override\\b"
            - "(?i)\\b(base64|encoded|cipher|rot13)[:\\s]"
            - "(?i)\\bfirst\\s+tell\\s+me\\b.*\\bnow\\s+(use|apply|convert)\\b"
      - id: violence_keywords
        weight: 1.0
        action: block
        match:
          regex:
            - "\\bkill\\b"
            - "\\bpoison\\b"
            - "\\bhurt\\b"
            - "\\bassault\\b"
            - "\\bbomb\\b"
            - "\\bpipe\\s*bomb\\b"
            - "\\bmake\\s+(a\\s+)?(pipe\\s*)?bomb\\b"
            - "\\bhow\\s+to\\s+make\\s+(a\\s+)?bomb\\b"
      - id: violence_substrings
        weight: 1.0
        action: block
        match:
          substrings:
            - makeabomb
            - buildabomb
            - pipebomb
            - hurtsomeone
            - killpeople
            - killperson
            - killhim
            - killher
      - id: violence_es_keywords
        weight: 1.0
        action: block
        languages:
          - es
        match:
          regex:
            - "\\basesinar\\b"
            - "\\bmatar\\b"
            - "\\bherir\\b"
            - "\\barmar\\s+una\\s+bomba\\b"
            - "\\bmejor\\s+manera\\s+de\\s+hacer\\s+daño\\b"
            - "\\bcomo\\s+lastimar\\b"
      - id: violence_es_substrings
        weight: 1.0
        action: block
        languages:
          - es
        match:
          substrings:
            - fabricarunabomba
            - hacerunabomba
            - lastimaralguien
      - id: violence_fr_keywords
        weight: 1.0
        action: block
        languages:
          - fr
        match:
          regex:
            - "\\btuer\\b"
            - "\\bblesser\\b"
            - "\\bfabriquer\\s+une\\s+bombe\\b"
            - "\\bmeilleure\\s+façon\\s+de\\s+nuire\\b"
  - id: self_harm_en
    category: self_harm
    language: en
    threshold: 0.0
    rules:
      - id: self_harm_keywords
        weight: 1.2
        action: block
        match:
          regex:
            - "\\bkill\\s+myself\\b"
            - "\\bend\\s+my\\s+life\\b"
            - "\\bhow\\s+to\\s+(?:harm|hurt)\\s+myself\\b"
            - "\\bself[-\\s]*harm\\b"
            - "\\bmethods?\\b.*\\b(suicide|self[-\\s]*harm)\\b"
            - "\\bcut(?:ting)?\\b.*\\b(myself|wrists?|veins)\\b"
      - id: self_harm_substrings
        weight: 1.2
        action: block
        match:
          substrings:
            - selfharm
            - killmyself
            - endmylife
            - hurtmyself
            - harmmyself
            - cutmyself
            - cutmywrists
            - cuttingwrists
            - cutmyveins
            - cuttingveins
      - id: self_harm_es_keywords
        weight: 1.2
        action: block
        languages:
          - es
        match:
          regex:
            - "\\bquiero\\s+morir\\b"
            - "\\bcomo\\s+quitarme\\s+la\\s+vida\\b"
            - "\\bcortar\\s+mis\\s+muñecas\\b"
            - "\\bautolesion\\w+\\b"
  - id: crime_en
    category: crime
    language: en
    threshold: 0.0
    rules:
      - id: crime_keywords
        weight: 1.0
        action: block
        match:
          regex:
            - "\\bhack\\b"
            - "\\bwireless\\b.*\\bhack\\b"
            - "\\bsql injection\\b"
            - "\\bsteal\\b"
            - "\\bbreak in\\b"
  - id: malware_en
    category: malware
    language: en
    threshold: 1.0
    rules:
      - id: malware_keywords
        weight: 1.3
        action: block
        match:
          regex:
            - "/etc/shadow"
            - "\\b(exfiltrat\\w+).*(/etc|shadow|passwd)\\b"
            - "\\b(powershell|wget|curl|certutil)\\b.*\\b(base64|payload|xor)\\b"
            - "\\b(keylogger|backdoor|c2|command\\s+and\\s+control)\\b"
            - "\\bmalware\\b"
            - "\\bteach\\W*malware\\b"
      - id: malware_substrings
        weight: 1.3
        action: block
        match:
          substrings:
            - malware
            - teachmalware
            - spreadmalware
            - deploymalware
            - installmalware
            - etcshadow
            - shadowfile
            - stealpasswd
      - id: malware_es_keywords
        weight: 1.1
        action: block
        languages:
          - es
        match:
          regex:
            - "\\bmalware\\b"
            - "\\bextraer\\s+/etc/shadow\\b"
            - "\\binstalar\\s+un\\s+keylogger\\b"
            - "\\bservidor\\s+c2\\b"
  - id: pii_en
    category: pii
    language: en
    threshold: 0.0
    rules:
      - id: pii_keywords
        weight: 1.0
        action: block
        match:
          regex:
            - "\\bssn\\b"
            - "\\bsocial security number\\b"
            - "\\bcredit card\\b"
            - "\\bcvv\\b"
  - id: violence_fa
    category: violence
    language: fa
    threshold: 0.99
    rules:
      - id: violence_fa_keywords
        weight: 1.0
        action: block
        languages:
          - fa
        match:
          regex:
            - "بمب"
            - "کشت(ن|ار)"
            - "انفجار"
            - "چاقو"
            - "حمله"
            - "خشونت"
            - "آسیب"
  - id: image_any
    category: image/*
    language: any
    threshold: 1.0
    rules:
      - id: noop_image
        weight: 1.0
        action: pass
        match:
          regex:
            - "(?!)"
  - id: audio_any
    category: audio/*
    language: any
    threshold: 1.0
    rules:
      - id: noop_audio
        weight: 1.0
        action: pass
        match:
          regex:
            - "(?!)"
