<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Deep blue background gradient for shield -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1f3d;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan glow for accents -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle inner shield highlight -->
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f38;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <!-- Classic shield: top flat, sides angled, bottom pointed -->
  <path d="M60 8 L100 24 L100 62 Q100 90 60 112 Q20 90 20 62 L20 24 Z"
        fill="url(#shieldGrad)"
        stroke="#22d3ee"
        stroke-width="2.5"
        stroke-linejoin="round"/>

  <!-- Shield inner face (slightly inset) -->
  <path d="M60 14 L94 28 L94 62 Q94 86 60 106 Q26 86 26 62 L26 28 Z"
        fill="url(#shieldInner)"
        opacity="0.6"/>

  <!-- Cyan shield rim highlight (top arc) -->
  <path d="M60 8 L100 24" stroke="#67e8f9" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M60 8 L20 24" stroke="#67e8f9" stroke-width="1" opacity="0.5" fill="none"/>

  <!-- Data circuit lines (PCB trace aesthetic) -->
  <!-- Horizontal main trace -->
  <line x1="38" y1="60" x2="82" y2="60" stroke="#22d3ee" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
  <!-- Vertical traces -->
  <line x1="60" y1="42" x2="60" y2="78" stroke="#22d3ee" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
  <!-- Corner node dots -->
  <circle cx="38" cy="60" r="2" fill="#22d3ee" opacity="0.4"/>
  <circle cx="82" cy="60" r="2" fill="#22d3ee" opacity="0.4"/>
  <circle cx="60" cy="42" r="2" fill="#22d3ee" opacity="0.4"/>
  <circle cx="60" cy="78" r="2" fill="#22d3ee" opacity="0.4"/>
  <!-- Short branch traces -->
  <line x1="38" y1="60" x2="38" y2="52" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  <line x1="82" y1="60" x2="82" y2="68" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>

  <!-- Central checkmark / guard pass mark — bold cyan -->
  <polyline points="45,60 56,72 76,48"
            fill="none"
            stroke="url(#cyanGrad)"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
            filter="url(#softGlow)"/>
</svg>
