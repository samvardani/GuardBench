name: Docker Build and Push

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image name (e.g., ghcr.io/OWNER/safety-eval-mini)'
        required: true
      tag:
        description: 'Tag (e.g., latest or v1)'
        required: true
        default: 'latest'
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
      - 'src/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ github.event.inputs.image_name || format('ghcr.io/{0}/safety-eval-mini:{1}', github.repository_owner, github.event.inputs.tag || 'latest') }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post summary
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "Pushed: ${{ github.event.inputs.image_name || format('ghcr.io/{0}/safety-eval-mini', github.repository_owner) }}:${{ github.event.inputs.tag || 'latest' }}" >> $GITHUB_STEP_SUMMARY













