name: safety-eval

on:
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install jinja2 matplotlib; fi

      - name: Build report (HTML)
        run: python -m src.report.build_report

      - name: CI Gate (per-slice thresholds)
        run: python -m src.runner.ci_gate --config gate.json

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-eval-report
          path: |
            report/**
            assets/**

      - name: Comment CI summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'report/ci_summary.md';
            let body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'No summary generated.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
