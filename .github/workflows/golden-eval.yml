name: Golden Eval Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *' # daily at 09:00 UTC

jobs:
  golden:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -r requirements-dev.txt || true
          pip install pytest pytest-asyncio

      - name: Run Golden Eval
        env:
          PYTHONPATH: src
        run: |
          pytest -q tests/test_golden_eval_set.py -k print_eval_metrics --maxfail=1 --disable-warnings | tee golden_eval_output.txt || true

      - name: Summarize
        run: |
          echo "### Golden Eval Summary" >> $GITHUB_STEP_SUMMARY
          echo "Run at: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '\n```' >> $GITHUB_STEP_SUMMARY
          tail -n 200 golden_eval_output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '\n```' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-eval-output
          path: golden_eval_output.txt













