name: Nightly Validation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Obfuscation Lab
        run: |
          python -m src.obfuscation.lab --slices "violence/en,self_harm/en,malware/en" --out report/obfuscation.json

      - name: Multilingual Parity
        run: |
          python -m src.multilingual.parity --category violence --langs en,fa,es --out report/parity.json

      - name: Chaos Drill Simulation
        run: |
          python -m src.incidents.simulator --scenario jailbreak --duration 10 --rate 5

      - name: Red-Team Swarm
        run: |
          python -m src.redteam.swarm --max-iters 100 --budget '{"violence/en": 5}'

      - name: Build Report
        run: |
          python -m src.report.build_report

      - name: Build Evidence Pack
        run: |
          python -m src.evidence.pack

      - name: Archive artefacts
        uses: actions/upload-artifact@v4
        with:
          name: safety-eval-nightly
          path: |
            report/
            dist/
            runs.jsonl
            tuned_thresholds.yaml
            notifications.log
