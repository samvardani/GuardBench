name: SeaRei CI

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: src
  TEST_MODE: "1"          # use deterministic stubs
  ENABLE_IMAGE: "0"       # don't pull big image models in CI
  OTEL_SDK_DISABLED: "1"  # disable telemetry to avoid flakiness
  GRPC_PORT: "50051"

jobs:
  tests:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install grpcio grpcio-tools pytest pytest-cov

      - name: Generate gRPC stubs
        run: |
          python -m grpc_tools.protoc \
            -I src/grpc_service \
            --python_out=src/grpc_generated \
            --grpc_python_out=src/grpc_generated \
            src/grpc_service/score.proto

      - name: Start gRPC server (background)
        run: |
          python -m grpc_service > grpc_server.log 2>&1 &
          echo $! > grpc_server.pid
          sleep 5
          # Verify server is running
          for i in {1..10}; do
            if python -c "import socket; s = socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 50051))"; then
              echo "gRPC server is ready on port 50051"
              exit 0
            fi
            echo "Waiting for gRPC server... ($i/10)"
            sleep 1
          done
          echo "gRPC server failed to start"
          cat grpc_server.log
          exit 1

      - name: Run tests
        run: |
          pytest -q -m "not slow" --maxfail=1 --disable-warnings \
                 --cov=src --cov-report=xml

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts-py${{ matrix.python-version }}
          path: |
            .coverage
            coverage.xml
            grpc_server.log
            reports/**

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install mypy types-requests
      - run: mypy src

  # Heavy "eval" job — only on push to main (NOT on PRs)
  eval:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # put your long eval pipeline here; it won't block PRs
      - run: echo "Eval pipeline runs only on main pushes."
