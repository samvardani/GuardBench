name: eval

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (runtime + test)
        run: |
          python -m pip install -U pip wheel
          # If you already have project deps:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # CI-specific deps to satisfy tests:
          pip install -r requirements-ci.txt
          # Safety net if files drift:
          pip install fastapi starlette uvicorn python-multipart jinja2 prometheus-client httpx anyio pytest pytest-asyncio

      - name: Run unit tests
        env:
          PYTHONPATH: src          # so "from src..." imports work
          MPLBACKEND: Agg          # headless matplotlib to avoid macOS GUI backend crash
        run: |
          pytest -q
