name: eval

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
          pip install grpcio grpcio-tools

      - name: Generate gRPC stubs
        run: |
          python -m grpc_tools.protoc \
            -I src/grpc_service \
            --python_out=src/grpc_generated \
            --grpc_python_out=src/grpc_generated \
            src/grpc_service/score.proto

      - name: Start gRPC server (background)
        run: |
          python -m grpc_service > grpc_server.log 2>&1 &
          echo $! > grpc_server.pid
          sleep 5
          # Verify server is running
          for i in {1..10}; do
            if python -c "import socket; s = socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 50051))"; then
              echo "gRPC server is ready on port 50051"
              exit 0
            fi
            echo "Waiting for gRPC server... ($i/10)"
            sleep 1
          done
          echo "gRPC server failed to start"
          cat grpc_server.log
          exit 1

      - name: Run unit tests
        env:
          PYTHONPATH: src
          MPLBACKEND: Agg
        run: |
          pytest -q -m "not slow" --disable-warnings
