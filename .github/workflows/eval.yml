name: Eval CI

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (runtime + test)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-ci.txt ]; then pip install -r requirements-ci.txt; fi
          # safety net in case lists drift:
          pip install fastapi starlette uvicorn python-multipart jinja2 prometheus-client httpx anyio pytest pytest-asyncio

      - name: Generate gRPC stubs
        run: |
          python -m grpc_tools.protoc -I src/grpc --python_out=src/grpc_generated --grpc_python_out=src/grpc_generated src/grpc/score.proto

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q
