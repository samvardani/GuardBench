name: eval
on:
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install jinja2 matplotlib pandas scikit-learn pyyaml

      - name: Run unit tests
        run: |
          pip install pytest
          pytest -q

      - name: Build report (HTML)
        run: python -m src.report.build_report

      - name: CI Gate (per-slice thresholds)
        run: python -m src.runner.ci_gate --config gate.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: safety-eval-report
          path: |
            report/index.html
            report/*.png
            report/metrics_*.json
            report/ci_summary.md
