syntax = "proto3";
package seval;

service ScoreService {
  rpc Score(ScoreRequest) returns (ScoreResponse);
  rpc BatchScore(stream ScoreRequest) returns (stream ScoreResponse);
}

message ScoreRequest {
  string text = 1;
  string category = 2;
  string language = 3;
  string guard = 4; // baseline or candidate
}

message ScoreResponse {
  double score = 1;
  string guard_version = 2;
  string policy_version = 3;
  string policy_checksum = 4;
  string request_id = 5;
}



