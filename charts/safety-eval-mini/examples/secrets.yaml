# Example Kubernetes Secrets for safety-eval-mini
# Create these secrets BEFORE installing the Helm chart
#
# SECURITY WARNING: This file contains sensitive credentials.
# - DO NOT commit to version control
# - Use sealed-secrets, external-secrets, or vault in production
# - Restrict RBAC access to these secrets

---
# OIDC/OAuth Secret
apiVersion: v1
kind: Secret
metadata:
  name: safety-eval-oidc
  namespace: default
type: Opaque
stringData:
  client-id: "your-oidc-client-id"
  client-secret: "your-oidc-client-secret"

---
# SAML Secret
apiVersion: v1
kind: Secret
metadata:
  name: safety-eval-saml
  namespace: default
type: Opaque
stringData:
  idp-cert: |
    -----BEGIN CERTIFICATE-----
    MIIDXTCCAkWgAwIBAgIJAKL0UG+mRKSzMA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV
    BAYTAlVTMRMwEQYDVQQIDApTb21lLVN0YXRlMSEwHwYDVQQKDBhJbnRlcm5ldCBX
    aWRnaXRzIFB0eSBMdGQwHhcNMjQwMTAxMDAwMDAwWhcNMjUwMTAxMDAwMDAwWjBF
    ...
    -----END CERTIFICATE-----
  idp-cert-fingerprint: "a1b2c3d4e5f67890abcdef1234567890abcdef1234567890abcdef1234567890"

---
# Slack OAuth Secret
apiVersion: v1
kind: Secret
metadata:
  name: safety-eval-slack
  namespace: default
type: Opaque
stringData:
  client-id: "your-slack-client-id"
  client-secret: "your-slack-client-secret"
  signing-secret: "your-slack-signing-secret"

---
# Metrics Auth Secret
apiVersion: v1
kind: Secret
metadata:
  name: safety-eval-metrics-auth
  namespace: default
type: Opaque
stringData:
  token: "your-prometheus-bearer-token"

