[project]
name = "safety-eval-mini"
version = "0.1.0"
description = "Tiny eval+report+gate for AI safety guards"
requires-python = ">=3.9"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["guards","report","runner","store","service"]  # package names under src
