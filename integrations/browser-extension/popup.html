<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SeaRei Safety Scanner</title>
    <style>
        body {
            width: 350px;
            padding: 0;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .header {
            background: rgba(255,255,255,0.1);
            padding: 16px;
            color: white;
        }
        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        .header p {
            margin: 4px 0 0 0;
            font-size: 12px;
            opacity: 0.9;
        }
        .content {
            padding: 16px;
            background: white;
        }
        .scan-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .scan-btn:hover {
            transform: translateY(-2px);
        }
        .scan-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
        }
        .result.safe {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        .result.unsafe {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .stat {
            background: #f3f4f6;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
        }
        .stat-label {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .footer {
            padding: 12px 16px;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
            font-size: 11px;
            color: #6b7280;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 8px;
            background: #f3f4f6;
            border-radius: 6px;
        }
        .toggle-label {
            font-size: 13px;
            color: #374151;
        }
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #667eea;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ SeaRei Safety Scanner</h1>
        <p>Real-time content analysis</p>
    </div>
    
    <div class="content">
        <div class="toggle-container">
            <span class="toggle-label">Auto-scan on page load</span>
            <label class="toggle">
                <input type="checkbox" id="autoScan">
                <span class="slider"></span>
            </label>
        </div>
        
        <button id="scanBtn" class="scan-btn">🔍 Scan Current Page</button>
        
        <div id="result"></div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="scannedCount">0</div>
                <div class="stat-label">Scanned</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="flaggedCount">0</div>
                <div class="stat-label">Flagged</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <span>Powered by SeaRei AI</span>
        <a href="#" id="settingsLink">Settings</a>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
