[mypy]
python_version = 3.11

# Enabled strict mode features
warn_unused_configs = True
disallow_any_generics = True
no_implicit_optional = True
warn_redundant_casts = True
strict_equality = True

# Gradual typing compatibility
warn_unused_ignores = False
disallow_untyped_defs = False
allow_untyped_calls = True
allow_untyped_defs = True
allow_incomplete_defs = False

# Third-party library handling
ignore_missing_imports = True

# Disable specific error codes for gradual typing
disable_error_code = no-untyped-def, no-any-return, unreachable, annotation-unchecked

# Per-module overrides
[mypy-grpc.*]
ignore_errors = True

[mypy-grpc_service.score_pb2]
ignore_errors = True

[mypy-grpc_service.score_pb2_grpc]
ignore_errors = True

[mypy-grpc_generated.score_pb2]
ignore_errors = True

[mypy-grpc_generated.score_pb2_grpc]
ignore_errors = True

[mypy-grpc_service.server]
ignore_errors = True

[mypy-seval_grpc.server]
ignore_errors = True

[mypy-grpc_service.clients.py_client]
ignore_errors = True

[mypy-grpc_service.interceptors]
ignore_errors = True

[mypy-grpc_service.metrics]
ignore_errors = True

# Third-party libraries
[mypy-yaml.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-slack_sdk.*]
ignore_missing_imports = True

[mypy-jinja2.*]
ignore_missing_imports = True

