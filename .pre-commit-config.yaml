repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - types-requests
        args: [--ignore-missing-imports, --no-strict-optional]
        files: ^src/

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: bash -c 'PYTHONPATH=src pytest tests/ --ignore=tests/test_grpc_trailers.py --ignore=tests/test_hardening_provenance.py --ignore=tests/test_hardening_traceid.py -q --maxfail=3'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

