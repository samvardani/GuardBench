<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Safety Evaluation Control Plane</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  </head>
  <body class="h-full bg-slate-950 text-slate-100">
    <div id="root" class="min-h-full"></div>
    <script type="text/babel">
      const { useCallback, useEffect, useMemo, useRef, useState } = React;

      const STORAGE_KEY = "safety-service-auth";

      const loadAuth = () => {
        try {
          const raw = window.localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (err) {
          console.warn("Failed to load auth", err);
          return null;
        }
      };

      const persistAuth = (auth) => {
        if (!auth) {
          window.localStorage.removeItem(STORAGE_KEY);
          return;
        }
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(auth));
      };

      const apiFetch = async (auth, path, options = {}) => {
        const headers = new Headers(options.headers || {});
        if (!(options.body instanceof FormData)) {
          headers.set("Content-Type", headers.get("Content-Type") || "application/json");
        }
        if (auth?.accessToken) {
          headers.set("Authorization", `Bearer ${auth.accessToken}`);
        }
        const response = await fetch(path, { ...options, headers });
        if (response.status === 204) {
          return {};
        }
        const contentType = response.headers.get("content-type") || "";
        const payload = contentType.includes("application/json") ? await response.json() : await response.text();
        if (!response.ok) {
          const detail = payload?.detail || payload?.message || response.statusText;
          throw new Error(detail);
        }
        return payload;
      };

      const formatNumber = (value) => {
        if (value === null || value === undefined) return "—";
        if (typeof value === "number") {
          return Number.isInteger(value) ? value.toString() : value.toFixed(3);
        }
        return value;
      };

      const StatCard = ({ label, value, tone = "neutral" }) => {
        const palette = {
          neutral: "bg-slate-900/70 border-slate-800 text-slate-200",
          success: "bg-emerald-900/40 border-emerald-500/40 text-emerald-200",
          warn: "bg-amber-900/40 border-amber-500/40 text-amber-200",
          danger: "bg-rose-900/40 border-rose-500/40 text-rose-200",
        };
        return (
          <div className={`rounded border px-4 py-3 text-sm ${palette[tone] || palette.neutral}`}>
            <div className="text-xs uppercase tracking-wide text-slate-400">{label}</div>
            <div className="text-xl font-semibold">{value}</div>
          </div>
        );
      };

      const Section = ({ title, description, actions, children }) => (
        <section className="mb-10">
          <header className="mb-4 flex flex-wrap items-center justify-between gap-3">
            <div>
              <h2 className="text-xl font-semibold text-teal-300">{title}</h2>
              {description && <p className="text-sm text-slate-400">{description}</p>}
            </div>
            {actions}
          </header>
          <div className="rounded-md border border-slate-800 bg-slate-900/60 p-4 shadow-lg shadow-black/30">
            {children}
          </div>
        </section>
      );

      const LoginPanel = ({ onLogin, initialError }) => {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [tenant, setTenant] = useState("");
        const [busy, setBusy] = useState(false);
        const [error, setError] = useState(initialError || "");

        const submit = async (event) => {
          event.preventDefault();
          setBusy(true);
          setError("");
          try {
            await onLogin({ email, password, tenantSlug: tenant || undefined });
          } catch (err) {
            setError(err.message || "Unable to login");
          } finally {
            setBusy(false);
          }
        };

        return (
          <div className="flex min-h-full flex-col items-center justify-center px-4 py-16">
            <div className="w-full max-w-md rounded-xl border border-slate-800 bg-slate-900/80 p-8 shadow-2xl shadow-teal-500/10">
              <h1 className="text-2xl font-semibold text-teal-200">Safety Evaluation Control Plane</h1>
              <p className="mt-2 text-sm text-slate-400">Log in with your tenant slug and credentials to manage guard evaluations in real time.</p>
              <form onSubmit={submit} className="mt-6 space-y-4">
                <div>
                  <label className="text-sm text-slate-300" htmlFor="login-email">Email</label>
                  <input
                    id="login-email"
                    type="email"
                    required
                    autoComplete="email"
                    value={email}
                    onChange={(event) => setEmail(event.target.value)}
                    className="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:border-teal-400 focus:outline-none"
                  />
                </div>
                <div>
                  <label className="text-sm text-slate-300" htmlFor="login-password">Password</label>
                  <input
                    id="login-password"
                    type="password"
                    required
                    autoComplete="current-password"
                    value={password}
                    onChange={(event) => setPassword(event.target.value)}
                    className="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:border-teal-400 focus:outline-none"
                  />
                </div>
                <div>
                  <label className="text-sm text-slate-300" htmlFor="login-tenant">Tenant Slug (optional)</label>
                  <input
                    id="login-tenant"
                    type="text"
                    placeholder="enterprise-safety"
                    value={tenant}
                    onChange={(event) => setTenant(event.target.value)}
                    className="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:border-teal-400 focus:outline-none"
                  />
                </div>
                {error && <p className="rounded border border-rose-500/50 bg-rose-900/30 px-3 py-2 text-sm text-rose-200">{error}</p>}
                <button
                  type="submit"
                  disabled={busy}
                  className="flex w-full items-center justify-center rounded bg-teal-500 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-teal-400 disabled:cursor-not-allowed disabled:opacity-70"
                >
                  {busy ? "Signing in…" : "Sign in"}
                </button>
              </form>
              <p className="mt-6 text-xs text-slate-500">
                Need a tenant space? POST to <code>/auth/signup</code> with a tenant name, email, and password to bootstrap the first owner.
              </p>
            </div>
          </div>
        );
      };

      const RunTable = ({ runs, onSelect, activeRunId }) => (
        <div className="overflow-hidden rounded border border-slate-800">
          <table className="min-w-full divide-y divide-slate-800 text-sm">
            <thead className="bg-slate-900/60 text-xs uppercase tracking-wide text-slate-400">
              <tr>
                <th className="px-3 py-2 text-left">Run</th>
                <th className="px-3 py-2 text-left">Created</th>
                <th className="px-3 py-2 text-left">Baseline</th>
                <th className="px-3 py-2 text-left">Candidate</th>
                <th className="px-3 py-2 text-left">Status</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-900/60">
              {runs.map((run) => (
                <tr
                  key={run.run_id}
                  onClick={() => onSelect(run.run_id)}
                  className={`cursor-pointer bg-slate-950/40 hover:bg-slate-900/80 ${activeRunId === run.run_id ? "bg-teal-500/10" : ""}`}
                >
                  <td className="px-3 py-2 font-mono text-xs text-teal-200">{run.run_id}</td>
                  <td className="px-3 py-2 text-slate-300">{run.created_at?.replace("T", " ") || "—"}</td>
                  <td className="px-3 py-2 text-slate-300">{run.engine_baseline || "—"}</td>
                  <td className="px-3 py-2 text-slate-300">{run.engine_candidate || "—"}</td>
                  <td className="px-3 py-2 text-slate-300">{run.run_status || "completed"}</td>
                </tr>
              ))}
              {runs.length === 0 && (
                <tr>
                  <td colSpan="5" className="px-3 py-4 text-center text-slate-500">No runs recorded yet.</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      );

      const MetricGrid = ({ metrics }) => {
        if (!metrics) return <p className="text-sm text-slate-400">No metrics captured yet.</p>;
        return (
          <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
            {Object.entries(metrics).map(([model, values]) => {
              const tone = values.recall < 0.85 ? "danger" : values.recall < 0.9 ? "warn" : "success";
              return (
                <div key={model} className="rounded border border-slate-800 bg-slate-900/70 p-4">
                  <h4 className="text-sm font-semibold text-teal-300">{model}</h4>
                  <dl className="mt-3 space-y-2 text-xs text-slate-300">
                    <div className="flex justify-between">
                      <dt>Precision</dt>
                      <dd>{formatNumber(values.precision)}</dd>
                    </div>
                    <div className="flex justify-between">
                      <dt>Recall</dt>
                      <dd className={tone === "danger" ? "text-rose-300" : tone === "warn" ? "text-amber-300" : "text-emerald-300"}>{formatNumber(values.recall)}</dd>
                    </div>
                    <div className="flex justify-between">
                      <dt>FNR</dt>
                      <dd>{formatNumber(values.fnr)}</dd>
                    </div>
                    <div className="flex justify-between">
                      <dt>Latency P99</dt>
                      <dd>{formatNumber(values.p99_ms)} ms</dd>
                    </div>
                  </dl>
                </div>
              );
            })}
          </div>
        );
      };

      const EventStream = ({ events }) => (
        <div className="max-h-60 overflow-y-auto rounded border border-slate-800 bg-slate-950/70 p-3 text-xs text-slate-300">
          {events.length === 0 && <p className="text-slate-500">Streaming telemetry will appear here once a run is in-flight.</p>}
          {events.map((event, idx) => (
            <div key={`${event.phase}-${idx}`} className="mb-2 last:mb-0">
              <div className="font-semibold text-teal-300">{event.phase}</div>
              <pre className="whitespace-pre-wrap break-words text-slate-400">{JSON.stringify(event, null, 2)}</pre>
            </div>
          ))}
        </div>
      );

      const AlertList = ({ alerts, onAck }) => (
        <div className="space-y-3">
          {alerts.length === 0 && <p className="text-sm text-slate-400">No active alerts for this tenant.</p>}
          {alerts.map((alert) => (
            <div key={alert.alert_id} className="rounded border border-rose-500/40 bg-rose-950/40 p-4">
              <div className="flex items-center justify-between">
                <h4 className="text-sm font-semibold text-rose-200">{alert.title}</h4>
                {!alert.acknowledged_at && (
                  <button
                    onClick={() => onAck(alert.alert_id)}
                    className="rounded bg-rose-500 px-2 py-1 text-xs font-medium text-slate-950 hover:bg-rose-400"
                  >
                    Acknowledge
                  </button>
                )}
              </div>
              <p className="mt-1 text-xs text-slate-300">{alert.message || "No description"}</p>
              <p className="mt-2 text-xs text-slate-500">Raised {alert.created_at?.replace("T", " ") || "—"}</p>
            </div>
          ))}
        </div>
      );

      const IntegrationForm = ({ catalog, onSubmit }) => {
        const [kind, setKind] = useState(catalog[0]?.kind || "");
        const [name, setName] = useState("");
        const [configText, setConfigText] = useState("{}");
        const [enabled, setEnabled] = useState(true);
        const [busy, setBusy] = useState(false);
        const [error, setError] = useState("");

        const submit = async (event) => {
          event.preventDefault();
          let config = {};
          try {
            config = configText ? JSON.parse(configText) : {};
          } catch (err) {
            setError("Config must be valid JSON");
            return;
          }
          setBusy(true);
          setError("");
          try {
            await onSubmit({ kind, name, config, enabled });
            setName("");
            setConfigText("{}");
          } catch (err) {
            setError(err.message || "Failed to create integration");
          } finally {
            setBusy(false);
          }
        };

        return (
          <form onSubmit={submit} className="space-y-3">
            <div className="grid gap-3 sm:grid-cols-2">
              <div>
                <label className="text-xs text-slate-400" htmlFor="integration-kind">Integration</label>
                <select
                  id="integration-kind"
                  value={kind}
                  onChange={(event) => setKind(event.target.value)}
                  className="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
                >
                  {catalog.map((item) => (
                    <option key={item.kind} value={item.kind}>{item.label}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-400" htmlFor="integration-name">Display Name</label>
                <input
                  id="integration-name"
                  value={name}
                  placeholder="My Datadog"
                  onChange={(event) => setName(event.target.value)}
                  className="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
                />
              </div>
            </div>
            <div>
              <label className="text-xs text-slate-400" htmlFor="integration-config">Config JSON</label>
              <textarea
                id="integration-config"
                rows="4"
                value={configText}
                onChange={(event) => setConfigText(event.target.value)}
                className="mt-1 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-xs font-mono"
              ></textarea>
            </div>
            <div className="flex items-center gap-2">
              <input
                id="integration-enabled"
                type="checkbox"
                checked={enabled}
                onChange={(event) => setEnabled(event.target.checked)}
                className="h-4 w-4 rounded border-slate-600 bg-slate-950"
              />
              <label htmlFor="integration-enabled" className="text-xs text-slate-300">Enabled</label>
            </div>
            {error && <p className="text-xs text-rose-300">{error}</p>}
            <button
              type="submit"
              disabled={busy}
              className="rounded bg-teal-500 px-3 py-2 text-xs font-semibold text-slate-950 hover:bg-teal-400 disabled:opacity-60"
            >
              {busy ? "Saving…" : "Add integration"}
            </button>
          </form>
        );
      };

      const DashboardView = ({ auth, onLogout }) => {
        const [guards, setGuards] = useState([]);
        const [runs, setRuns] = useState([]);
        const [selectedRunId, setSelectedRunId] = useState(null);
        const [selectedRun, setSelectedRun] = useState(null);
        const [events, setEvents] = useState([]);
        const [alerts, setAlerts] = useState([]);
        const [integrations, setIntegrations] = useState([]);
        const [catalog, setCatalog] = useState([]);
        const [auditEvents, setAuditEvents] = useState([]);
        const [users, setUsers] = useState({ items: [], allowed: true });
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState("");
        const wsRef = useRef(null);

        const loadInitial = useCallback(async () => {
          setLoading(true);
          setError("");
          try {
            const [guardsPayload, runsPayload, alertsPayload, integrationsPayload, catalogPayload, auditPayload] = await Promise.all([
              apiFetch(auth, "/guards"),
              apiFetch(auth, "/runs"),
              apiFetch(auth, "/alerts"),
              apiFetch(auth, "/integrations"),
              apiFetch(auth, "/integrations/catalog"),
              apiFetch(auth, "/audit/events"),
            ]);
            setGuards(guardsPayload || []);
            setRuns((runsPayload?.runs || []).map((run) => ({ ...run })));
            setAlerts(alertsPayload?.alerts || []);
            setIntegrations(integrationsPayload?.integrations || []);
            setCatalog(catalogPayload?.catalog || []);
            setAuditEvents(auditPayload?.events || []);
            try {
              const usersPayload = await apiFetch(auth, "/users");
              setUsers({ items: usersPayload?.users || [], allowed: true });
            } catch (userErr) {
              if (userErr.message?.includes("Insufficient")) {
                setUsers({ items: [], allowed: false });
              } else {
                throw userErr;
              }
            }
          } catch (err) {
            console.error(err);
            setError(err.message || "Failed to load data");
          } finally {
            setLoading(false);
          }
        }, [auth]);

        useEffect(() => {
          loadInitial();
        }, [loadInitial]);

        useEffect(() => {
          return () => {
            if (wsRef.current) {
              wsRef.current.close();
              wsRef.current = null;
            }
          };
        }, []);

        useEffect(() => {
          if (!selectedRunId) {
            setSelectedRun(null);
            setEvents([]);
            if (wsRef.current) {
              wsRef.current.close();
              wsRef.current = null;
            }
            return;
          }
          let cancelled = false;
          const fetchDetail = async () => {
            try {
              const detail = await apiFetch(auth, `/runs/${selectedRunId}`);
              if (!cancelled) {
                setSelectedRun(detail);
              }
            } catch (err) {
              console.error(err);
            }
          };
          fetchDetail();

          if (wsRef.current) {
            wsRef.current.close();
            wsRef.current = null;
          }
          const proto = window.location.protocol === "https:" ? "wss" : "ws";
          const wsUrl = `${proto}://${window.location.host}/ws/runs/${selectedRunId}?token=${encodeURIComponent(auth.accessToken)}`;
          const ws = new WebSocket(wsUrl);
          wsRef.current = ws;
          setEvents([]);
          ws.onmessage = (event) => {
            try {
              const payload = JSON.parse(event.data);
              setEvents((prev) => [...prev.slice(-49), payload]);
              if (payload.metrics) {
                setSelectedRun((prev) => prev ? { ...prev, metrics: payload.metrics } : prev);
              }
            } catch (err) {
              console.error("Failed to parse event", err);
            }
          };
          ws.onerror = () => {
            console.warn("WebSocket error for run", selectedRunId);
          };
          ws.onclose = () => {
            wsRef.current = null;
          };
          return () => {
            cancelled = true;
            if (wsRef.current === ws) {
              ws.close();
              wsRef.current = null;
            }
          };
        }, [auth, selectedRunId]);

        const ackAlert = async (alertId) => {
          try {
            await apiFetch(auth, `/alerts/${alertId}/ack`, { method: "POST" });
            setAlerts((prev) => prev.map((alert) => alert.alert_id === alertId ? { ...alert, acknowledged_at: new Date().toISOString() } : alert));
          } catch (err) {
            alert(err.message || "Failed to acknowledge alert");
          }
        };

        const createIntegration = async (payload) => {
          try {
            const record = await apiFetch(auth, "/integrations", { method: "POST", body: JSON.stringify(payload) });
            setIntegrations((prev) => [record, ...prev]);
          } catch (err) {
            throw err;
          }
        };

        const guardCount = guards.length;
        const alertCount = alerts.filter((alert) => !alert.acknowledged_at).length;
        const latestRun = runs[0];
        const candidateRecall = selectedRun?.metrics?.candidate?.recall ?? latestRun?.candidate_recall;

        return (
          <div className="mx-auto max-w-7xl px-4 py-8">
            <header className="mb-10 flex flex-wrap items-center justify-between gap-3">
              <div>
                <h1 className="text-3xl font-semibold text-teal-200">Safety Evaluation Control Plane</h1>
                <p className="mt-1 text-sm text-slate-400">Tenant <span className="font-semibold text-teal-300">{auth.tenant.slug || auth.tenant.id}</span> • signed in as {auth.user.email} ({auth.user.role})</p>
              </div>
              <button
                onClick={() => { persistAuth(null); onLogout(); }}
                className="rounded border border-slate-700 px-3 py-2 text-xs font-medium text-slate-300 hover:border-rose-400 hover:text-rose-200"
              >
                Sign out
              </button>
            </header>

            {error && <p className="mb-6 rounded border border-rose-500/40 bg-rose-900/30 px-4 py-2 text-sm text-rose-200">{error}</p>}

            <div className="mb-10 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
              <StatCard label="Registered Guards" value={guardCount} tone="neutral" />
              <StatCard label="Open Alerts" value={alertCount} tone={alertCount > 0 ? "danger" : "success"} />
              <StatCard label="Runs Tracked" value={runs.length} tone="neutral" />
              <StatCard label="Candidate Recall" value={candidateRecall ? (candidateRecall * 100).toFixed(2) + "%" : "—"} tone={candidateRecall && candidateRecall < 0.85 ? "danger" : "success"} />
            </div>

            <Section
              title="Guard Runs"
              description="Recent offline evaluations and upload scorecards"
              actions={
                <button
                  onClick={() => loadInitial()}
                  className="rounded border border-slate-700 px-3 py-1 text-xs text-slate-200 hover:border-teal-400"
                >
                  Refresh
                </button>
              }
            >
              {loading ? <p className="text-sm text-slate-400">Loading runs…</p> : <RunTable runs={runs} activeRunId={selectedRunId} onSelect={setSelectedRunId} />}
              {selectedRun && (
                <div className="mt-6 grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
                  <div>
                    <h3 className="text-sm font-semibold text-teal-200">Run Metrics</h3>
                    <MetricGrid metrics={selectedRun.metrics} />
                  </div>
                  <div>
                    <h3 className="text-sm font-semibold text-teal-200">Live Events</h3>
                    <EventStream events={events} />
                  </div>
                </div>
              )}
            </Section>

            <div className="grid gap-8 lg:grid-cols-2">
              <Section title="Alerts" description="Auto-generated when KPIs breach tenant thresholds">
                <AlertList alerts={alerts} onAck={ackAlert} />
              </Section>
              <Section title="Audit Trail" description="Security-grade audit events synced with SIEM connectors">
                <div className="max-h-64 overflow-y-auto text-xs text-slate-300">
                  {auditEvents.length === 0 && <p className="text-slate-500">No audit events recorded.</p>}
                  {auditEvents.map((event) => (
                    <div key={event.event_id} className="border-b border-slate-800 py-2 last:border-none">
                      <div className="font-semibold text-teal-200">{event.action}</div>
                      <div className="text-slate-400">{event.created_at?.replace("T", " ") || "—"}</div>
                      {event.context && <pre className="mt-1 whitespace-pre-wrap break-words text-slate-500">{JSON.stringify(event.context)}</pre>}
                    </div>
                  ))}
                </div>
              </Section>
            </div>

            <div className="grid gap-8 lg:grid-cols-2">
              <Section title="Integrations" description="Connect ML platforms, logging, SIEM, and deployment pipelines">
                <div className="space-y-4">
                  <div className="space-y-3">
                    {integrations.length === 0 && <p className="text-sm text-slate-400">No integrations configured yet.</p>}
                    {integrations.map((integration) => (
                      <div key={integration.integration_id} className="rounded border border-slate-800 bg-slate-900/70 p-4 text-xs text-slate-300">
                        <div className="flex items-center justify-between">
                          <div>
                            <p className="text-sm font-semibold text-teal-200">{integration.name || integration.kind}</p>
                            <p className="text-slate-500">{integration.kind}</p>
                          </div>
                          <span className={`rounded px-2 py-1 text-[10px] font-semibold uppercase ${integration.enabled ? "bg-emerald-500/20 text-emerald-200" : "bg-slate-800 text-slate-400"}`}>
                            {integration.enabled ? "Enabled" : "Disabled"}
                          </span>
                        </div>
                        <pre className="mt-2 whitespace-pre-wrap break-words text-slate-500">{JSON.stringify(integration.config || {}, null, 2)}</pre>
                      </div>
                    ))}
                  </div>
                  {(auth.user.role === "owner" || auth.user.role === "admin") && catalog.length > 0 ? (
                    <div className="rounded border border-slate-800 bg-slate-950/60 p-4">
                      <h4 className="text-sm font-semibold text-teal-200">Create Integration</h4>
                      <IntegrationForm catalog={catalog} onSubmit={createIntegration} />
                    </div>
                  ) : auth.user.role === "viewer" || auth.user.role === "analyst" ? (
                    <p className="text-xs text-slate-500">Integration management requires admin or owner role.</p>
                  ) : null}
                </div>
              </Section>

              <Section title="Users" description="Role-based access for analysts and responders">
                {users.allowed ? (
                  <div className="space-y-3 text-xs text-slate-300">
                    {users.items.length === 0 && <p className="text-slate-500">No additional users enrolled.</p>}
                    {users.items.map((user) => (
                      <div key={user.user_id} className="rounded border border-slate-800 bg-slate-900/70 p-3">
                        <div className="flex items-center justify-between">
                          <p className="font-medium text-teal-200">{user.email}</p>
                          <span className="rounded bg-slate-800 px-2 py-1 text-[10px] uppercase tracking-wide text-slate-300">{user.role}</span>
                        </div>
                        <p className="text-slate-500">Joined {user.created_at?.split("T")[0] || "—"}</p>
                      </div>
                    ))}
                  </div>
                ) : (
                  <p className="text-xs text-slate-500">You need admin privileges to view tenant users.</p>
                )}
              </Section>
            </div>

            <footer className="mt-12 border-t border-slate-800 pt-6 text-xs text-slate-500">
              The dashboard streams run telemetry from <code>/ws/runs/&lt;run_id&gt;</code>, polls REST endpoints for alerts and integrations, and stores credentials in <code>localStorage</code>.
            </footer>
          </div>
        );
      };

      const App = () => {
        const [auth, setAuth] = useState(loadAuth());
        const [error, setError] = useState("");

        const handleLogin = async ({ email, password, tenantSlug }) => {
          const payload = await apiFetch(null, "/auth/login", {
            method: "POST",
            body: JSON.stringify({ email, password, tenant_slug: tenantSlug }),
          });
          persistAuth(payload);
          setAuth(payload);
          setError("");
        };

        const handleLogout = () => {
          persistAuth(null);
          setAuth(null);
        };

        if (!auth) {
          return <LoginPanel onLogin={handleLogin} initialError={error} />;
        }

        return <DashboardView auth={auth} onLogout={handleLogout} />;
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
