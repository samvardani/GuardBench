<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dataset Upload & Evaluation</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-3xl px-4 py-10">
      <header class="mb-10">
        <h1 class="text-3xl font-bold text-teal-300">Dataset Upload &amp; Evaluation</h1>
        <p class="mt-2 text-sm text-slate-400">
          Upload a CSV with prompts (columns: <code>text</code>, optional <code>category</code>, <code>language</code>, <code>label</code>). Select guard options and run an offline scorecard.
        </p>
      </header>

      <form id="upload-form" class="space-y-6 rounded-lg border border-slate-800 bg-slate-900/70 p-6">
        <div>
          <label class="block text-sm font-medium text-slate-300" for="file-input">Prompt CSV</label>
          <input
            id="file-input"
            name="file"
            type="file"
            accept=".csv"
            required
            class="mt-2 block w-full rounded border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100"
          />
        </div>

        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-slate-300" for="baseline-guard">Baseline Guard</label>
            <select
              id="baseline-guard"
              name="baseline_guard"
              class="mt-2 block w-full rounded border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100"
            ></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300" for="candidate-guard">Candidate Guard</label>
            <select
              id="candidate-guard"
              name="candidate_guard"
              class="mt-2 block w-full rounded border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100"
            ></select>
          </div>
        </div>

        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-slate-300" for="default-category">Default Category</label>
            <input
              id="default-category"
              name="default_category"
              type="text"
              placeholder="violence"
              class="mt-2 block w-full rounded border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300" for="default-language">Default Language</label>
            <input
              id="default-language"
              name="default_language"
              type="text"
              placeholder="en"
              class="mt-2 block w-full rounded border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100"
            />
          </div>
        </div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded bg-teal-500 px-4 py-2 text-sm font-medium text-slate-950 transition hover:bg-teal-400 focus:outline-none focus:ring-2 focus:ring-teal-400"
        >
          Run Evaluation
        </button>
      </form>

      <section id="results" class="mt-8 hidden rounded-lg border border-slate-800 bg-slate-900/60 p-6">
        <h2 class="text-xl font-semibold text-teal-200">Results</h2>
        <div id="results-content" class="mt-4 space-y-3 text-sm text-slate-200"></div>
      </section>
    </main>

    <script>
      async function fetchGuards() {
        try {
          const response = await fetch('/guards');
          if (!response.ok) throw new Error('Failed to load guards');
          const data = await response.json();
          const entries = Object.entries(data);
          const baselineSelect = document.getElementById('baseline-guard');
          const candidateSelect = document.getElementById('candidate-guard');
          baselineSelect.innerHTML = '';
          candidateSelect.innerHTML = '';
          entries.forEach(([key, label]) => {
            const optionA = document.createElement('option');
            optionA.value = key;
            optionA.textContent = `${label} (${key})`;
            baselineSelect.appendChild(optionA);
            const optionB = optionA.cloneNode(true);
            candidateSelect.appendChild(optionB);
          });
          baselineSelect.value = 'baseline';
          candidateSelect.value = 'candidate';
        } catch (err) {
          console.error(err);
        }
      }

      async function submitForm(event) {
        event.preventDefault();
        const form = event.target;
        const formData = new FormData(form);
        const resultsSection = document.getElementById('results');
        const resultsContent = document.getElementById('results-content');
        resultsContent.innerHTML = '<p class="text-slate-400">Running evaluation…</p>';
        resultsSection.classList.remove('hidden');

        try {
          const response = await fetch('/upload-evaluate', {
            method: 'POST',
            body: formData,
          });
          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || `Request failed with status ${response.status}`);
          }
          const payload = await response.json();
          const metrics = payload.candidate_metrics || {};
          resultsContent.innerHTML = `
            <div>
              <p class="text-slate-300">Run ID: <span class="text-teal-300">${payload.run_id}</span></p>
              <p class="mt-1 text-slate-300">Rows evaluated: <span class="text-teal-300">${payload.total_rows}</span></p>
            </div>
            <div class="mt-4">
              <h3 class="text-sm font-semibold text-slate-200">Candidate Metrics (strict)</h3>
              <ul class="mt-2 grid grid-cols-2 gap-2 text-xs text-slate-300">
                <li>TP: ${metrics.tp ?? '—'}</li>
                <li>FP: ${metrics.fp ?? '—'}</li>
                <li>TN: ${metrics.tn ?? '—'}</li>
                <li>FN: ${metrics.fn ?? '—'}</li>
                <li>Precision: ${(metrics.precision ?? 0).toFixed(3)}</li>
                <li>Recall: ${(metrics.recall ?? 0).toFixed(3)}</li>
                <li>FNR: ${(metrics.fnr ?? 0).toFixed(3)}</li>
                <li>FPR: ${(metrics.fpr ?? 0).toFixed(3)}</li>
              </ul>
            </div>
            <div class="mt-4">
              <a
                href="${payload.bundle_url}"
                class="inline-flex items-center rounded bg-teal-500 px-3 py-2 text-sm font-medium text-slate-900 hover:bg-teal-400"
                download
              >
                Download Scorecard
              </a>
            </div>
          `;
        } catch (err) {
          resultsContent.innerHTML = `<p class="text-sm text-rose-300">${err.message}</p>`;
        }
      }

      document.getElementById('upload-form').addEventListener('submit', submitForm);
      fetchGuards();
    </script>
  </body>
</html>
