# Google Cloud Build configuration for SeaRei Safety Service
steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'deployment/gcp/Dockerfile.production'
      - '-t'
      - 'gcr.io/$PROJECT_ID/searei-safety:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/searei-safety:latest'
      - '.'

  # 2. Push the image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/searei-safety:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/searei-safety:latest'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'searei-safety-service'
      - '--image=gcr.io/$PROJECT_ID/searei-safety:$SHORT_SHA'
      - '--platform=managed'
      - '--region=$_REGION'
      - '--allow-unauthenticated'
      - '--port=8001'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=ENVIRONMENT=production,LOG_LEVEL=info'
      - '--set-secrets=SESSION_SECRET=searei-session-secret:latest,DATABASE_URL=searei-database-url:latest'

# Store images in GCR
images:
  - 'gcr.io/$PROJECT_ID/searei-safety:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/searei-safety:latest'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  substitutionOption: 'ALLOW_LOOSE'
  logging: CLOUD_LOGGING_ONLY

# Substitutions
substitutions:
  _REGION: 'us-central1'

# Timeout
timeout: '1200s'












