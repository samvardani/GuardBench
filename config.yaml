dataset_path: ./dataset/sample.csv

engines:
  baseline:
    name: "rules-v1"
    timeout_ms: 800
    retries: 1
  candidate:
    name: "candidate-v1"
    timeout_ms: 800
    retries: 1

policy_version: "v0.1"
risk_weights:
  minors: 10
  extremism: 8
  self_harm: 7
  violence: 6
  crime: 6
  malware: 6
  hate: 6
  pii: 5
  medical_legal: 4
  benign: 0


thresholds:
  default: 1.0
  malware: 0.9
  violence: 1.0
  pii: 1.0
  crime: 1.0
  self_harm: 1.0
  extremism: 1.0


# Per-slice thresholds (category -> language -> threshold)
slice_thresholds:
  violence:
    fa: 0.85
    en: 0.95
  malware:
    en: 0.85
