# Example runtime tuning for local service runs
runtime:
  uvicorn:
    host: 127.0.0.1
    port: 8010
    workers: 4
    log_level: warning
    timeout_keep_alive: 5
  predictor:
    max_workers: 32
    timeout_seconds: 2.0
  rate_limit:
    enabled: false
    token_limit: 60
    window_seconds: 60
  tracing:
    otlp_endpoint: ""
  redis:
    url: ""
  kafka:
    brokers: ""
    rest_proxy: ""
